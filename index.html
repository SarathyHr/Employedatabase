<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SARATHY GROUP - HR PORTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --sarathy-blue: #0054A6;
            --sarathy-red: #E31E24;
            --slate-50: #f8fafc;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            text-transform: uppercase;
            -webkit-tap-highlight-color: transparent;
        }

        input, select, textarea {
            text-transform: uppercase;
            font-size: 16px !important; /* Prevents iOS zoom on focus */
        }

        .text-sarathy-blue { color: var(--sarathy-blue); }
        .text-sarathy-red { color: var(--sarathy-red); }
        .bg-sarathy-blue { background-color: var(--sarathy-blue); }

        .modern-card {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.07);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .status-stamp {
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 9999px;
            display: inline-flex;
            font-size: 10px;
            border: 1px solid currentColor;
            letter-spacing: 0.05em;
        }

        .status-rejected { color: #dc2626; background: #fef2f2; }
        .status-selected { color: #059669; background: #ecfdf5; }
        .status-pending { color: #d97706; background: #fffbeb; }

        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--sarathy-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 84, 166, 0.4);
            z-index: 50;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fab:active { transform: scale(0.9) rotate(90deg); }

        /* Custom Scroll */
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up { animation: slideUp 0.4s ease-out forwards; }

        /* Sticky header backdrop */
        .mobile-header {
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
        }

        /* Requirements Badge */
        .req-pill {
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            color: #475569;
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900">
        <div class="w-full max-w-sm animate-up">
            <div class="modern-card p-8 bg-white text-center">
                <div class="mb-8">
                    <img src="Sarathy2.png.png" alt="SARATHY" class="w-48 mx-auto mb-4" onerror="this.src='https://via.placeholder.com/200x80?text=SARATHY+GROUP'">
                    <h2 class="text-xs font-black tracking-[0.3em] text-slate-400">EXECUTIVE PORTAL</h2>
                </div>
                
                <div id="loginError" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-[10px] font-bold mb-6 border border-red-100">
                    ACCESS DENIED. INVALID PIN.
                </div>

                <form id="loginForm" class="space-y-4">
                    <div class="text-left">
                        <label class="text-[9px] font-black text-slate-400 ml-2 mb-1 block uppercase">ID</label>
                        <input type="text" id="username" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold focus:ring-2 ring-blue-100 outline-none transition-all uppercase">
                    </div>
                    <div class="text-left">
                        <label class="text-[9px] font-black text-slate-400 ml-2 mb-1 block uppercase">PIN</label>
                        <input type="password" id="password" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold focus:ring-2 ring-blue-100 outline-none transition-all uppercase">
                    </div>
                    <button type="submit" class="w-full bg-sarathy-blue text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all text-xs tracking-widest mt-4">
                        LOGIN TO SYSTEM
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboardPage" class="hidden">
        <header class="mobile-header px-4 py-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <!-- LOGO ADDED HERE -->
                <img src="Sarathy2.png.png" alt="SARATHY" class="h-8 md:h-10 w-auto" onerror="this.style.display='none'">
                <h2 class="font-black text-sm md:text-base tracking-tighter border-l border-slate-200 pl-3">HR <span class="text-sarathy-red">PORTAL</span></h2>
            </div>
            <div class="flex items-center gap-2">
                <div class="text-right hidden sm:block">
                    <p class="text-[8px] font-black text-slate-400" id="userRoleDisplay">ADMIN</p>
                </div>
                <button onclick="logout()" class="w-10 h-10 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <main class="p-4 md:p-8 max-w-6xl mx-auto space-y-6">
            <!-- Header Section -->
            <div class="flex flex-col gap-4">
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">PERSONNEL <span class="text-slate-300">HUB</span></h1>
                    <p class="text-[9px] font-black text-slate-500 tracking-widest mt-1 flex items-center gap-2">
                        <i class="fas fa-calendar-alt text-sarathy-blue"></i>
                        <span id="currentViewMonth">LOADING...</span>
                    </p>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="month" id="monthFilter" onchange="renderTable()" 
                           class="px-4 py-3 bg-white border border-slate-200 rounded-xl font-bold text-xs outline-none shadow-sm">
                    <button onclick="openReqModal()" class="px-4 py-3 bg-slate-800 text-white rounded-xl flex items-center justify-center gap-2 font-black text-[10px] shadow-md">
                        <i class="fas fa-bullseye text-sarathy-red"></i> TARGETS
                    </button>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="modern-card p-4 border-l-4 border-sarathy-blue">
                    <p class="text-[8px] font-black text-slate-400 tracking-widest mb-1">TOTAL</p>
                    <h3 class="text-2xl font-black" id="statTotal">0</h3>
                </div>
                <div class="modern-card p-4 border-l-4 border-emerald-500">
                    <p class="text-[8px] font-black text-slate-400 tracking-widest mb-1">SELECTED</p>
                    <h3 class="text-2xl font-black text-emerald-600" id="statSelected">0</h3>
                </div>
                <div class="modern-card p-4 border-l-4 border-amber-500">
                    <p class="text-[8px] font-black text-slate-400 tracking-widest mb-1">PENDING</p>
                    <h3 class="text-2xl font-black text-amber-600" id="statPending">0</h3>
                </div>
                <div class="modern-card p-4 border-l-4 border-red-500">
                    <p class="text-[8px] font-black text-slate-400 tracking-widest mb-1">REJECTED</p>
                    <h3 class="text-2xl font-black text-red-600" id="statRejected">0</h3>
                </div>
            </div>

            <!-- Department Breakdown -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                <div class="bg-white p-3 rounded-2xl border border-slate-200 flex justify-between items-center px-4">
                    <span class="text-[9px] font-black text-slate-400">SALES</span>
                    <div class="flex items-center gap-2">
                        <span class="font-black text-slate-800" id="countSales">0</span>
                        <span class="req-pill" id="reqSales">0</span>
                    </div>
                </div>
                <div class="bg-white p-3 rounded-2xl border border-slate-200 flex justify-between items-center px-4">
                    <span class="text-[9px] font-black text-slate-400">SERVICE</span>
                    <div class="flex items-center gap-2">
                        <span class="font-black text-slate-800" id="countService">0</span>
                        <span class="req-pill" id="reqService">0</span>
                    </div>
                </div>
                <div class="bg-white p-3 rounded-2xl border border-slate-200 flex justify-between items-center px-4">
                    <span class="text-[9px] font-black text-slate-400">SPARE</span>
                    <div class="flex items-center gap-2">
                        <span class="font-black text-slate-800" id="countSpare">0</span>
                        <span class="req-pill" id="reqSpare">0</span>
                    </div>
                </div>
                <div class="bg-white p-3 rounded-2xl border border-slate-200 flex justify-between items-center px-4">
                    <span class="text-[9px] font-black text-slate-400">ACCOUNTS</span>
                    <div class="flex items-center gap-2">
                        <span class="font-black text-slate-800" id="countAccounts">0</span>
                        <span class="req-pill" id="reqAccounts">0</span>
                    </div>
                </div>
            </div>

            <!-- Search & Filter -->
            <div class="space-y-3">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="SEARCH PERSONNEL..." 
                           class="w-full pl-11 pr-4 py-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm focus:ring-4 ring-blue-50 outline-none transition-all shadow-sm">
                </div>
                <div class="flex flex-col sm:flex-row gap-2">
                    <select id="compFilter" onchange="renderTable()" class="flex-1 px-4 py-4 bg-white border border-sarathy-blue rounded-2xl font-black text-[10px] shadow-sm text-sarathy-blue">
                        <option value="All">ALL COMPANIES</option>
                        <option value="SARATHY MOTORS">SARATHY MOTORS</option>
                        <option value="SARATHY BIKES PVT LTD">SARATHY BIKES PVT LTD</option>
                        <option value="SARATHY ELECTRIC PVT LTD">SARATHY ELECTRIC PVT LTD</option>
                        <option value="SARATHY AUTOCARS">SARATHY AUTOCARS</option>
                        <option value="SARATHY CARS PVT LTD">SARATHY CARS PVT LTD</option>
                    </select>
                    <div class="flex gap-2 flex-1">
                        <select id="deptFilter" onchange="renderTable()" class="flex-1 px-4 py-4 bg-white border border-slate-200 rounded-2xl font-bold text-[10px] shadow-sm">
                            <option value="All">ALL DEPTS</option>
                            <option value="SALES">SALES</option>
                            <option value="SERVICE">SERVICE</option>
                            <option value="SPARE">SPARE</option>
                            <option value="ACCOUNTS">ACCOUNTS</option>
                        </select>
                        <select id="statusFilter" onchange="renderTable()" class="flex-1 px-4 py-4 bg-white border border-slate-200 rounded-2xl font-bold text-[10px] shadow-sm">
                            <option value="All">ALL STATUS</option>
                            <option value="SELECTED">SELECTED</option>
                            <option value="PENDING">PENDING</option>
                            <option value="REJECTED">REJECTED</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Data List (Mobile Optimized) -->
            <div id="dataList" class="space-y-4">
                <!-- Records injected here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden py-16 text-center modern-card bg-slate-50 border-2 border-dashed border-slate-200">
                <i class="fas fa-folder-open text-4xl text-slate-300 mb-4"></i>
                <p class="text-slate-400 font-black text-xs tracking-widest">NO RECORDS FOUND</p>
            </div>
        </main>
    </div>

    <!-- FAB for Adding -->
    <button id="addBtn" onclick="openModal()" class="fab hidden">
        <i class="fas fa-plus text-xl"></i>
    </button>

    <!-- MODAL: ADD/EDIT -->
    <div id="addModal" class="fixed inset-0 bg-slate-900/60 z-[60] flex items-end sm:items-center justify-center hidden backdrop-blur-sm">
        <div id="modalContent" class="bg-white rounded-t-[2.5rem] sm:rounded-[2.5rem] w-full max-w-lg overflow-hidden shadow-2xl flex flex-col max-h-[90vh] transition-transform duration-300 transform translate-y-full">
            <div class="p-6 flex justify-between items-center border-b">
                <div>
                    <h2 class="text-lg font-black text-slate-800" id="modalTitle">ADD PERSONNEL</h2>
                    <p class="text-[9px] font-black text-slate-400 tracking-widest mt-1 uppercase">Database Registry</p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center">
                    <i class="fas fa-times text-slate-400"></i>
                </button>
            </div>
            
            <div class="overflow-y-auto p-6 custom-scroll">
                <form id="joineeForm" class="grid grid-cols-1 gap-4">
                    <input type="hidden" id="editId">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-2 mb-1 block">EMP ID</label>
                            <input type="text" id="empId" readonly class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-black text-sarathy-blue">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-2 mb-1 block">STATUS</label>
                            <select id="status" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-black text-sarathy-blue">
                                <option value="PENDING">PENDING</option>
                                <option value="SELECTED">SELECTED</option>
                                <option value="REJECTED">REJECTED</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="text-[9px] font-black text-slate-400 ml-2 mb-1 block">FULL NAME</label>
                        <input type="text" id="empName" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-2 mb-1 block">PHONE</label>
                            <input type="tel" id="empPhone" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-2 mb-1 block">DEPARTMENT</label>
                            <select id="dept" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold">
                                <option value="SALES">SALES</option>
                                <option value="SERVICE">SERVICE</option>
                                <option value="SPARE">SPARE</option>
                                <option value="ACCOUNTS">ACCOUNTS</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="text-[9px] font-black text-slate-400 ml-2 mb-1 block">ENTITY / COMPANY</label>
                        <select id="company" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold">
                            <option value="SARATHY MOTORS">SARATHY MOTORS</option>
                            <option value="SARATHY BIKES PVT LTD">SARATHY BIKES PVT LTD</option>
                            <option value="SARATHY ELECTRIC PVT LTD">SARATHY ELECTRIC PVT LTD</option>
                            <option value="SARATHY AUTOCARS">SARATHY AUTOCARS</option>
                            <option value="SARATHY CARS PVT LTD">SARATHY CARS PVT LTD</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-2 mb-1 block">INTERVIEW DATE</label>
                            <input type="date" id="interviewDate" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-2 mb-1 block">JOIN DATE</label>
                            <input type="date" id="joinDate" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold">
                        </div>
                    </div>

                    <div>
                        <label class="text-[9px] font-black text-slate-400 ml-2 mb-1 block">REMARKS</label>
                        <textarea id="manager" rows="2" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-sarathy-blue text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-xs tracking-widest mt-2">
                        COMMIT RECORD
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- TARGETS MODAL -->
    <div id="reqModal" class="fixed inset-0 bg-slate-900/60 z-[60] flex items-center justify-center hidden backdrop-blur-sm p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-2xl overflow-hidden shadow-2xl flex flex-col max-h-[85vh] animate-up">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h2 class="text-sm font-black uppercase">MANPOWER TARGETS</h2>
                <button onclick="addReqRow()" class="bg-sarathy-blue text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-md">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            
            <div id="reqEntriesContainer" class="p-6 overflow-y-auto space-y-4 custom-scroll">
                <!-- Target rows injected here -->
            </div>

            <div class="p-6 border-t bg-slate-50 flex gap-2">
                <button onclick="saveRequirements()" class="flex-1 bg-emerald-600 text-white py-4 rounded-xl font-black text-[10px]">SAVE CHANGES</button>
                <button onclick="closeReqModal()" class="flex-1 bg-slate-200 text-slate-600 py-4 rounded-xl font-black text-[10px]">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-32 opacity-0 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl transition-all duration-300 z-[100] flex items-center gap-3">
        <i id="toastIcon" class="fas fa-check-circle text-emerald-400"></i>
        <p id="toastMessage" class="font-black text-[10px] tracking-widest"></p>
    </div>

    <script>
        const USERS = [
            { user: 'ADMIN', pass: 'SARATHY@26', role: 'System Admin' },
            { user: 'HR', pass: 'SARATHY@HR', role: 'HR Executive' }
        ];

        let currentUser = null;
        let joinees = JSON.parse(localStorage.getItem('sarathy_db_v4')) || [];
        let manpowerReqList = JSON.parse(localStorage.getItem('sarathy_req_detailed_v4')) || [];

        window.onload = () => {
            const now = new Date();
            document.getElementById('monthFilter').value = now.toISOString().slice(0, 7);
            const session = sessionStorage.getItem('sarathy_session');
            if(session) {
                currentUser = JSON.parse(session);
                showDashboard();
            }
        };

        function isAdmin() { return currentUser && currentUser.user === 'ADMIN'; }

        function getNextEmpId() {
            if (joinees.length === 0) return "SG-001";
            const ids = joinees.map(j => {
                const num = parseInt(j.empId.replace("SG-", ""));
                return isNaN(num) ? 0 : num;
            });
            return "SG-" + (Math.max(...ids) + 1).toString().padStart(3, '0');
        }

        /**
         * Converts YYYY-MM-DD to DD-MM-YYYY
         */
        function formatDisplayDate(dateStr) {
            if (!dateStr) return "---";
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            return `${parts[2]}-${parts[1]}-${parts[0]}`;
        }

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value.trim().toUpperCase();
            const p = document.getElementById('password').value;
            const found = USERS.find(x => x.user === u && x.pass === p);
            if(found) {
                currentUser = found;
                sessionStorage.setItem('sarathy_session', JSON.stringify(found));
                showDashboard();
                document.getElementById('loginError').classList.add('hidden');
                document.getElementById('loginForm').reset();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        };

        function logout() {
            sessionStorage.removeItem('sarathy_session');
            currentUser = null;
            document.getElementById('dashboardPage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
        }

        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('userRoleDisplay').textContent = currentUser.role;
            if (isAdmin()) document.getElementById('addBtn').classList.remove('hidden');
            renderTable();
        }

        function openModal() {
            document.getElementById('joineeForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('empId').value = getNextEmpId();
            document.getElementById('modalTitle').innerText = "ADD PERSONNEL";
            const modal = document.getElementById('addModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modalContent').style.transform = "translateY(0)";
            }, 10);
        }

        function closeModal() {
            document.getElementById('modalContent').style.transform = "translateY(100%)";
            setTimeout(() => document.getElementById('addModal').classList.add('hidden'), 300);
        }

        function openReqModal() {
            if (!isAdmin()) return showToast("ADMIN ONLY", "error");
            renderReqEntries();
            document.getElementById('reqModal').classList.remove('hidden');
        }

        function closeReqModal() {
            document.getElementById('reqModal').classList.add('hidden');
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = msg;
            document.getElementById('toastIcon').className = type === 'success' ? 'fas fa-check-circle text-emerald-400' : 'fas fa-exclamation-circle text-red-400';
            toast.classList.remove('opacity-0', 'translate-y-32');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-32'), 3000);
        }

        document.getElementById('joineeForm').onsubmit = (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const data = {
                id: editId ? parseInt(editId) : Date.now(),
                empId: document.getElementById('empId').value,
                name: document.getElementById('empName').value.trim().toUpperCase(),
                phone: document.getElementById('empPhone').value.trim(),
                company: document.getElementById('company').value,
                dept: document.getElementById('dept').value,
                status: document.getElementById('status').value,
                interviewDate: document.getElementById('interviewDate').value,
                joinDate: document.getElementById('joinDate').value,
                manager: document.getElementById('manager').value.trim().toUpperCase()
            };

            if (editId) {
                const idx = joinees.findIndex(x => x.id === data.id);
                if (idx !== -1) joinees[idx] = data;
                showToast("RECORD UPDATED");
            } else {
                joinees.push(data);
                showToast("RECORD ADDED");
            }
            localStorage.setItem('sarathy_db_v4', JSON.stringify(joinees));
            closeModal();
            renderTable();
        };

        function editRecord(id) {
            if(!isAdmin()) return;
            const r = joinees.find(x => x.id === id);
            if (!r) return;
            openModal();
            document.getElementById('modalTitle').innerText = "EDIT RECORD";
            document.getElementById('editId').value = r.id;
            document.getElementById('empId').value = r.empId;
            document.getElementById('empName').value = r.name;
            document.getElementById('empPhone').value = r.phone;
            document.getElementById('company').value = r.company;
            document.getElementById('dept').value = r.dept;
            document.getElementById('status').value = r.status;
            document.getElementById('interviewDate').value = r.interviewDate;
            document.getElementById('joinDate').value = r.joinDate;
            document.getElementById('manager').value = r.manager;
        }

        function deleteRecord(id) {
            if(!isAdmin()) return;
            if(confirm('ARE YOU SURE?')) {
                joinees = joinees.filter(x => x.id !== id);
                localStorage.setItem('sarathy_db_v4', JSON.stringify(joinees));
                renderTable();
                showToast("DELETED", "error");
            }
        }

        function renderTable() {
            const month = document.getElementById('monthFilter').value;
            const term = document.getElementById('searchInput').value.toUpperCase();
            const stat = document.getElementById('statusFilter').value;
            const dept = document.getElementById('deptFilter').value;
            const comp = document.getElementById('compFilter').value;
            
            if(month) {
                const [y, m] = month.split('-');
                const monthLabel = new Date(y, m-1).toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
                document.getElementById('currentViewMonth').innerText = monthLabel;
            }

            let filtered = joinees.filter(x => {
                const dateToMatch = (x.joinDate || x.interviewDate || "");
                const mMatch = month === "" || dateToMatch.startsWith(month);
                const sMatch = x.name.includes(term) || x.empId.includes(term);
                const stMatch = stat === "All" || x.status === stat;
                const dMatch = dept === "All" || x.dept === dept;
                const cMatch = comp === "All" || x.company === comp;
                return mMatch && sMatch && stMatch && dMatch && cMatch;
            });

            const list = document.getElementById('dataList');
            list.innerHTML = '';

            if(filtered.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
            } else {
                document.getElementById('emptyState').classList.add('hidden');
                filtered.forEach(x => {
                    const statusClass = `status-${x.status.toLowerCase()}`;
                    list.innerHTML += `
                        <div class="modern-card p-5 animate-up">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center text-sarathy-blue font-black text-xl">
                                        ${x.name[0]}
                                    </div>
                                    <div class="max-w-[150px]">
                                        <h4 class="font-black text-slate-800 leading-tight truncate">${x.name}</h4>
                                        <p class="text-[9px] text-slate-400 font-bold mt-1 tracking-widest">${x.empId} • ${x.dept}</p>
                                    </div>
                                </div>
                                <span class="status-stamp ${statusClass}">${x.status}</span>
                            </div>

                            <div class="mb-3">
                                <p class="text-[10px] font-black text-slate-700">${x.company}</p>
                            </div>
                            
                            <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 grid grid-cols-2 gap-2 text-[10px] mb-4">
                                <div>
                                    <span class="text-slate-400 text-[8px] block mb-1">INTERVIEW</span>
                                    <span class="font-bold">${formatDisplayDate(x.interviewDate)}</span>
                                </div>
                                <div>
                                    <span class="text-slate-400 text-[8px] block mb-1">JOIN DATE</span>
                                    <span class="font-bold">${formatDisplayDate(x.joinDate)}</span>
                                </div>
                            </div>

                            <div class="flex items-center justify-between">
                                <p class="text-[9px] text-amber-600 italic font-bold truncate pr-4">${x.manager || 'NO REMARKS'}</p>
                                <div class="flex gap-2">
                                    ${isAdmin() ? `
                                        <button onclick="editRecord(${x.id})" class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center"><i class="fas fa-edit text-xs"></i></button>
                                        <button onclick="deleteRecord(${x.id})" class="w-8 h-8 rounded-lg bg-red-50 text-red-600 flex items-center justify-center"><i class="fas fa-trash text-xs"></i></button>
                                    ` : ''}
                                    <a href="tel:${x.phone}" class="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center"><i class="fas fa-phone-alt text-xs"></i></a>
                                </div>
                            </div>
                        </div>`;
                });
            }
            updateStats(filtered, comp);
        }

        function updateStats(data, selectedCompany) {
            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statSelected').innerText = data.filter(x => x.status === 'SELECTED').length;
            document.getElementById('statPending').innerText = data.filter(x => x.status === 'PENDING').length;
            document.getElementById('statRejected').innerText = data.filter(x => x.status === 'REJECTED').length;

            const depts = ['SALES', 'SERVICE', 'SPARE', 'ACCOUNTS'];
            depts.forEach(d => {
                // Count how many are selected in the currently filtered data
                const count = data.filter(x => x.dept === d && x.status === 'SELECTED').length;
                document.getElementById(`count${d.charAt(0) + d.slice(1).toLowerCase()}`).innerText = count;
                
                // Pull targets filtered by Company if a specific company is selected
                let target = 0;
                if (selectedCompany === "All") {
                    target = manpowerReqList.filter(r => r.dept === d).reduce((a, c) => a + parseInt(c.target || 0), 0);
                } else {
                    target = manpowerReqList.filter(r => r.dept === d && r.company === selectedCompany).reduce((a, c) => a + parseInt(c.target || 0), 0);
                }
                
                document.getElementById(`req${d.charAt(0) + d.slice(1).toLowerCase()}`).innerText = target;
            });
        }

        function renderReqEntries() {
            const container = document.getElementById('reqEntriesContainer');
            container.innerHTML = '';
            manpowerReqList.forEach((req, idx) => {
                container.innerHTML += `
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200 relative">
                        <button onclick="removeReqRow(${idx})" class="absolute top-2 right-2 text-red-400 p-2"><i class="fas fa-times-circle"></i></button>
                        <div class="space-y-3">
                            <select onchange="updateReqField(${idx}, 'company', this.value)" class="w-full p-3 border rounded-xl font-bold text-xs">
                                <option value="SARATHY MOTORS" ${req.company === 'SARATHY MOTORS' ? 'selected' : ''}>SARATHY MOTORS</option>
                                <option value="SARATHY BIKES PVT LTD" ${req.company === 'SARATHY BIKES PVT LTD' ? 'selected' : ''}>SARATHY BIKES PVT LTD</option>
                                <option value="SARATHY AUTOCARS" ${req.company === 'SARATHY AUTOCARS' ? 'selected' : ''}>SARATHY AUTOCARS</option>
                                <option value="SARATHY ELECTRIC PVT LTD" ${req.company === 'SARATHY ELECTRIC PVT LTD' ? 'selected' : ''}>SARATHY ELECTRIC PVT LTD</option>
                                <option value="SARATHY CARS PVT LTD" ${req.company === 'SARATHY CARS PVT LTD' ? 'selected' : ''}>SARATHY CARS PVT LTD</option>
                            </select>
                            <div class="grid grid-cols-2 gap-2">
                                <select onchange="updateReqField(${idx}, 'dept', this.value)" class="p-3 border rounded-xl font-bold text-xs">
                                    <option value="SALES" ${req.dept === 'SALES' ? 'selected' : ''}>SALES</option>
                                    <option value="SERVICE" ${req.dept === 'SERVICE' ? 'selected' : ''}>SERVICE</option>
                                    <option value="SPARE" ${req.dept === 'SPARE' ? 'selected' : ''}>SPARE</option>
                                    <option value="ACCOUNTS" ${req.dept === 'ACCOUNTS' ? 'selected' : ''}>ACCOUNTS</option>
                                </select>
                                <input type="number" value="${req.target}" onchange="updateReqField(${idx}, 'target', this.value)" class="p-3 border rounded-xl font-black text-center text-xs" placeholder="TARGET">
                            </div>
                        </div>
                    </div>`;
            });
        }

        function addReqRow() {
            manpowerReqList.push({ company: 'SARATHY MOTORS', dept: 'SALES', target: 1 });
            renderReqEntries();
        }

        function removeReqRow(idx) {
            manpowerReqList.splice(idx, 1);
            renderReqEntries();
        }

        function updateReqField(idx, field, value) {
            manpowerReqList[idx][field] = value;
        }

        function saveRequirements() {
            localStorage.setItem('sarathy_req_detailed_v4', JSON.stringify(manpowerReqList));
            showToast("TARGETS UPDATED");
            closeReqModal();
            renderTable();
        }
    </script>
</body>
</html>
